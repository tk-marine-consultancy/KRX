<style>
:root{--bg:#0a0f1e;--card:#111827;--card2:#1a2236;--accent:#00d4aa;--adim:rgba(0,212,170,.13);--blue:#3b82f6;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--dim:#64748b;--muted:#94a3b8;--border:#1e2d45;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;}
input,select,textarea,button{font-family:'Noto Sans KR',sans-serif;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#app{display:flex;flex-direction:column;height:100dvh;}
#header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10;}
#content{flex:1;overflow-y:auto;padding:16px;padding-bottom:90px;-webkit-overflow-scrolling:touch;}
#tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);}
.tab-btn{flex:1;padding:9px 2px 7px;background:none;border:none;border-top:2px solid transparent;color:var(--dim);font-size:9px;cursor:pointer;line-height:1.4;}
.tab-btn.active{color:var(--accent);border-top-color:var(--accent);font-weight:700;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.inp{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:15px;outline:none;width:100%;}
.inp:focus{border-color:var(--accent);}
.btn-ok{background:linear-gradient(135deg,var(--accent),var(--blue));border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px;padding:14px;width:100%;cursor:pointer;}
.btn-no{background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:14px;padding:13px;cursor:pointer;width:100%;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade-in{animation:fadeIn .3s ease forwards;}
.slide-up{animation:slideUp .35s cubic-bezier(.34,1.56,.64,1) forwards;}
/* 빠른입력 모달 */
#qoverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
#qoverlay.open{display:flex;}
#qsheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:500px;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,16px);max-height:90vh;overflow-y:auto;}
.qprog-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:0 20px 14px;}
.qprog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));transition:width .3s;}
/* 키패드 */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.nk{background:var(--card2);padding:16px;font-size:20px;font-weight:500;text-align:center;cursor:pointer;user-select:none;}
.nk:active{background:#2a3a55;}
.nk.s2{grid-column:span 2;}
.nk.del{color:var(--red);}
/* 액션 카드 */
.ac{padding:20px 0;border-radius:12px;font-size:17px;font-weight:700;text-align:center;cursor:pointer;border:2px solid;transition:transform .1s;}
.ac:active{transform:scale(.96);}
/* 종목 아이템 */
.si{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;}
.si:active{background:#1e2d45;}
/* 태그 */
.tag{padding:7px 13px;background:var(--card2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:13px;cursor:pointer;}
.tag:active{opacity:.7;}
/* 체크 */
.chi{display:flex;align-items:center;gap:12px;padding:13px;border-bottom:1px solid var(--border);cursor:pointer;}
.chi:last-child{border-bottom:none;}
.chi.done{background:var(--adim);}
.chb{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.chb.on{background:var(--accent);border-color:var(--accent);}
.sbadge{font-size:10px;padding:2px 8px;border-radius:8px;}
#quick-btn{margin-left:auto;padding:8px 16px;background:linear-gradient(135deg,var(--red),#f97316);border:none;border-radius:20px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 12px rgba(239,68,68,.4);flex-shrink:0;}

/* 실행취소 토스트 */
#undo-toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:#1a2236;border:1px solid var(--accent);border-radius:12px;
  padding:12px 18px;display:flex;align-items:center;gap:12px;
  z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.5);
  transition:opacity .3s;white-space:nowrap;
  opacity:0;pointer-events:none;
}
#undo-toast.show{opacity:1;pointer-events:auto;}
</style>
</head>

function pushUndo(type, data){
  undoStack.unshift({type, data, time:Date.now()});
  if(undoStack.length>10) undoStack.pop();
}
function undo(){
  if(!undoStack.length){alert('복구할 내역이 없어요.');return;}
  const last=undoStack.shift();
  if(last.type==='journal_add'){
    // 투자일지 추가 → 삭제로 복구
    journal=journal.filter(j=>j.id!==last.data.entry.id);
    sv('j',journal);
    // 예수금 원복
    deposits=last.data.deposits;
    sv('dep2',deposits);
    // 포트폴리오 원복
    portfolio=last.data.portfolio;
    sv('p',portfolio);
    alert('✅ 복구 완료!\n거래 기록이 취소됐어요.');
  } else if(last.type==='journal_del'){
    // 투자일지 삭제 → 복구
    journal=[last.data.entry,...journal].sort((a,b)=>new Date(b.date)-new Date(a.date));
    sv('j',journal);
    alert('✅ 복구 완료!\n삭제한 기록이 돌아왔어요.');
  } else if(last.type==='portfolio_del'){
    // 포트폴리오 삭제 → 복구
    portfolio=[...portfolio, last.data];
    sv('p',portfolio);
    alert('✅ 복구 완료!\n삭제한 종목이 돌아왔어요.');
  }
  if(curTab==='journal') rJournal();
  if(curTab==='portfolio') rPortfolio();
}

        <div style="font-size:10px;color:${gainTotal>=0?'var(--accent)':'var(--red)'};">${gainTotal>=0?'▲':'▼'}${Math.abs(gainPct).toFixed(1)}%</div>

      <div></div>

  c.innerHTML=h;
}

    <div style="font-size:15px;font-weight:700;margin-bottom:4px;">💰 예수금 설정</div>
    <div style="font-size:12px;color:#64748b;margin-bottom:18px;">두 계좌의 잔액을 각각 입력하세요</div>

    <div style="margin-bottom:12px;">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:6px;">계좌 1 이름</div>
      <input id="dep-n1" class="inp" value="${deposits.a1.name}" placeholder="예: 미래에셋증권" style="margin-bottom:8px;"/>
      <div style="font-size:11px;color:#94a3b8;margin-bottom:6px;">계좌 1 잔액 (원)</div>
      <input id="dep-a1" class="inp" type="number" value="${deposits.a1.amount||''}" placeholder="0"/>
    </div>

    <div style="height:1px;background:#1e2d45;margin-bottom:12px;"></div>

    <div style="margin-bottom:18px;">
      <div style="font-size:11px;color:#94a3b8;margin-bottom:6px;">계좌 2 이름</div>
      <input id="dep-n2" class="inp" value="${deposits.a2.name}" placeholder="예: 카카오뱅크" style="margin-bottom:8px;"/>
      <div style="font-size:11px;color:#94a3b8;margin-bottom:6px;">계좌 2 잔액 (원)</div>
      <input id="dep-a2" class="inp" type="number" value="${deposits.a2.amount||''}" placeholder="0"/>
    </div>

    <div style="background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:12px;color:#94a3b8;">합계 예수금</span>
      <span id="dep-total" style="font-size:16px;font-weight:700;color:#00d4aa;font-family:'JetBrains Mono',monospace;">${(deposits.a1.amount+deposits.a2.amount).toLocaleString()}원</span>
    </div>

    <div style="display:flex;gap:8px;">
      <button onclick="document.getElementById('dep-overlay').remove()" style="flex:1;padding:13px;background:#1a2236;border:1px solid #1e2d45;border-radius:10px;color:#94a3b8;font-size:14px;cursor:pointer;">취소</button>
      <button onclick="saveDeposit()" style="flex:2;padding:13px;background:linear-gradient(135deg,#00d4aa,#3b82f6);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;">저장</button>
    </div>
  </div>`;

  // 합계 실시간 업데이트
  overlay.querySelectorAll && setTimeout(()=>{
    ['dep-a1','dep-a2'].forEach(id=>{
      const el=document.getElementById(id);
      if(el)el.addEventListener('input',()=>{
        const a1=Number((document.getElementById('dep-a1')||{}).value)||0;
        const a2=Number((document.getElementById('dep-a2')||{}).value)||0;
        const t=document.getElementById('dep-total');
        if(t)t.textContent=(a1+a2).toLocaleString()+'원';

function saveDeposit(){
  const n1=(document.getElementById('dep-n1')||{}).value||'계좌1';
  const a1=Number((document.getElementById('dep-a1')||{}).value)||0;
  const n2=(document.getElementById('dep-n2')||{}).value||'계좌2';
  const a2=Number((document.getElementById('dep-a2')||{}).value)||0;
  deposits={a1:{name:n1,amount:a1},a2:{name:n2,amount:a2}};
  sv('dep2',deposits);
  const ov=document.getElementById('dep-overlay');
  if(ov)ov.remove();
  rPortfolio();
}

function editCurPrice(id){
  const h=portfolio.find(h=>h.id===id);if(!h)return;
  const v=prompt(`${h.name} 현재가를 입력하세요 (원):`, h.curPrice||h.price);
  if(v===null)return;
  const cur=Number(v.replace(/,/g,''))||0;
  portfolio=portfolio.map(p=>p.id===id?{...p,curPrice:cur}:p);
  sv('p',portfolio);
  rPortfolio();
}

// ── 통합 종목 검색 패널 (포트폴리오/빠른입력 공용) ──────────
function buildStockPanel(targetId, onSelect){
  const el=document.getElementById(targetId);if(!el)return;
  const secs=['전체',...Array.from(new Set(TOP135.map(s=>s.sector)))];
  el.innerHTML=`
    <div class="card" style="border-color:rgba(59,130,246,.4);margin-bottom:12px;">
      <div style="font-size:12px;color:var(--blue);margin-bottom:10px;font-weight:700;">🔍 종목 검색</div>

      <!-- 검색창 (자동완성) -->
      <div style="position:relative;margin-bottom:10px;">
        <input class="inp" id="sp-search" placeholder="종목명 또는 코드 입력..."
          oninput="filterStockPanel()" style="font-size:15px;"/>
        <div id="sp-suggest" style="display:none;"></div>
      </div>

      <!-- 필터 -->
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
        <select class="inp" id="sp-sec" onchange="filterStockPanel()" style="flex:1;font-size:12px;padding:7px 8px;">
          ${secs.map(s=>`<option>${s}</option>`).join('')}
        </select>
        <select class="inp" id="sp-bk" onchange="filterStockPanel()" style="flex:1;font-size:12px;padding:7px 8px;">
          ${['전체','안정형','성장형','기회형'].map(b=>`<option>${b}</option>`).join('')}
        </select>
      </div>

      <!-- 즐겨찾기 -->
      ${favorites.length?`
        <div style="font-size:11px;color:var(--yellow);margin-bottom:6px;font-weight:600;">⭐ 즐겨찾기</div>
        <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;-webkit-overflow-scrolling:touch;">
          ${favorites.map(f=>`
            <div onclick="spSelect('${f.name}','${f.code}','${f.sector}','${f.bucket}')"
              style="flex-shrink:0;padding:8px 12px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);border-radius:10px;cursor:pointer;text-align:center;min-width:68px;">
              <div style="font-size:13px;font-weight:700;color:var(--yellow);">${f.name}</div>
              <div style="font-size:10px;color:${BC[f.bucket]||'var(--dim)'};">${f.bucket}</div>
            </div>`).join('')}
        </div>`:''}

      <!-- 종목 그리드 -->
      <div id="sp-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:300px;overflow-y:auto;"></div>
    </div>`;
  // 현재 콜백 저장
  window._spOnSelect=onSelect;
  filterStockPanel();
}

function filterStockPanel(){
  const q=(document.getElementById('sp-search')||{}).value||'';
  const sec=(document.getElementById('sp-sec')||{}).value||'전체';
  const bk=(document.getElementById('sp-bk')||{}).value||'전체';
  const g=document.getElementById('sp-grid');if(!g)return;
  const f=TOP135.filter(s=>
    (sec==='전체'||s.sector===sec)&&
    (bk==='전체'||s.bucket===bk)&&
    (!q||s.name.includes(q)||s.code.includes(q))
  ).slice(0,50);
  if(!f.length){g.innerHTML=`<div style="grid-column:span 2;text-align:center;color:var(--dim);padding:20px;font-size:13px;">검색 결과 없음</div>`;return;}
  g.innerHTML=f.map(s=>`
    <div onclick="spSelect('${s.name}','${s.code}','${s.sector}','${s.bucket}')"
      style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;">
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:5px;">
        <span style="font-size:10px;color:var(--dim);">#${s.rank}</span>
        <span style="font-weight:700;font-size:13px;flex:1;">${s.name}</span>
        <button onmousedown="event.stopPropagation();addFavorite({name:'${s.name}',code:'${s.code}',sector:'${s.sector}',bucket:'${s.bucket}'})"
          style="background:none;border:none;font-size:15px;cursor:pointer;color:${favorites.find(fv=>fv.code===s.code)?'var(--yellow)':'var(--dim)'};">⭐</button>
      </div>
      <div style="display:flex;gap:4px;align-items:center;">
        <span class="sbadge" style="background:${sc(s.sector)}22;color:${sc(s.sector)};">${s.sector}</span>
        <span style="font-size:11px;font-weight:600;color:${BC[s.bucket]};margin-left:auto;">${s.bucket}</span>
      </div>
      <div style="font-size:10px;color:var(--dim);margin-top:3px;font-family:'JetBrains Mono',monospace;">${s.code}</div>
    </div>`).join('');
}

function spSelect(name,code,sector,bucket){
  if(window._spOnSelect) window._spOnSelect({name,code,sector,bucket});
}

// ── 포트폴리오 - TOP135 선택 ──────────────────────────────────
function showT50(){
  const t50=document.getElementById('t50p');if(!t50)return;
  const pf=document.getElementById('pfform');if(pf)pf.innerHTML='';
  t50.style.display=t50.style.display==='none'?'block':'block';
  buildStockPanel('t50p', (stock)=>{

}

function autoStop(pct){
  const pr=+(document.getElementById('pfpr')||{}).value||0;
  if(!pr){alert('매수가를 먼저 입력해주세요.');return;}
  const stop=Math.round(pr*(1+pct/100));
  const el=document.getElementById('pfst');
  if(el)el.value=stop;
}

function addP(){
  const s=pfSelected;
  const name=s?.name||(document.getElementById('pfn')||{}).value||'';
  const price=+(document.getElementById('pfpr')||{}).value||0;
  const shares=+(document.getElementById('pfsh')||{}).value||0;
  const target=+(document.getElementById('pfta')||{}).value||0;
  const stop=+(document.getElementById('pfst')||{}).value||0;
  const bucket=s?.bucket||'안정형';
  const code=s?.code||'';
  if(!name||!price||!shares){alert('종목, 매수가, 수량은 필수예요.');return;}
  portfolio.push({id:Date.now(),name,code,price,shares,target,stop,bucket,date:new Date().toISOString()});
  sv('p',portfolio);
  pfSelected=null;
  document.getElementById('pfform').innerHTML='';
  document.getElementById('t50p').innerHTML='';
  rPortfolio();
}
function delP(id){
  const item=portfolio.find(h=>h.id===id);
  if(item) pushUndo('portfolio_del', JSON.parse(JSON.stringify(item)));
  portfolio=portfolio.filter(h=>h.id!==id);
  sv('p',portfolio);
  rPortfolio();
  showUndoToast('종목 삭제됨');
}

// 자동완성 입력 핸들러 - 화면 재렌더 없이 드롭다운만 업데이트
function chOnInput(v){

  if(!box)return;

  const found=TOP135.filter(s=>s.name.includes(v)||s.code.includes(v)).slice(0,12);

  box.innerHTML=found.map(s=>`

async function aiCheckList(){
  const inp=document.getElementById('ch-ticker');
  if(inp)chTicker=inp.value.trim();
  if(!chTicker){alert('종목명을 입력해주세요!');return;}
  if(!apiKey){alert('설정 탭에서 Claude API 키를 먼저 입력해주세요.');go('settings');return;}
  if(chAnalyzing)return;

  chAnalyzing=true;
  const lbl=document.getElementById('ai-ch-label');
  if(lbl)lbl.textContent='AI 분석 중...';

  // 분석 중 화면 표시 (저장 변수에도 반영)
  chAiResult=`
    <div class="card" style="border-color:rgba(124,58,237,.5);margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="width:8px;height:8px;border-radius:50%;background:#7c3aed;display:inline-block;animation:pulse 1s infinite;"></span>
        <span style="font-size:13px;color:#a78bfa;font-weight:600;">🤖 ${chTicker} 체크리스트 분석 중...</span>
      </div>
      <div id="ch-stream" style="font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap;min-height:40px;"> </div>
    </div>`;
  const resultEl=document.getElementById('ch-ai-result');
  if(resultEl)resultEl.innerHTML=chAiResult;

  const prompt=`한국 주식 "${chTicker}"에 대해 아래 16개 체크리스트 항목을 하나씩 조사하고 판단해주세요.

각 항목은 반드시 아래 형식으로만 답변하세요 (다른 형식 금지):
[c번호] ✅통과 | 근거한줄
또는
[c번호] ❌미통과 | 근거한줄

항목목록:
[c1] PER 10배 이하 또는 업종 평균 이하
[c2] 배당수익률 3% 이상
[c3] 부채비율 100% 이하
[c4] 최근 3년 연속 흑자
[c5] 매출 YoY 성장률 10% 이상
[c6] 영업이익률 개선 추세
[c7] 기관/외국인 순매수 지속
[c8] PEG ratio 1 이하 (성장 대비 저평가)
[c9] 명확한 단기 촉매 존재
[c10] 거래량 급증 + 기술적 지지선 확인
[c11] 손절선 설정 가능 여부
[c12] 테마/소문이 아닌 실적 기반 확인
[c13] 한 종목 비중 20% 초과 금지 확인
[c14] 분할 매수 가능 여부
[c15] 목표가 설정 가능 여부
[c16] 섹터 분산 확인

16개 항목 모두 답변 후 마지막에 아래를 추가:
추천버킷: (안정형/성장형/기회형 중 하나)
총평: (한줄)`;

  let fullText='';
  await streamAI(prompt, t=>{
    fullText=t;
    const s=document.getElementById('ch-stream');
    if(s)s.textContent=t;
    // 스트리밍 내용도 저장변수에 반영
    chAiResult=chAiResult.replace(/<div id="ch-stream"[^>]*>.*?<\/div>/s,

  });

  // 파싱해서 자동 체크
  applyAIChecks(fullText);
  chAnalyzing=false;
  const lbl2=document.getElementById('ai-ch-label');
  if(lbl2)lbl2.textContent='AI 자동 체크리스트 분석';
}

function applyAIChecks(text){
  // 체크 초기화
  Object.keys(checks).forEach(g=>{
    checks[g]=checks[g].map(item=>({...item,done:false}));
  });
  // [c숫자] ✅ 또는 ❌ 파싱
  for(let i=1;i<=16;i++){
    const re=new RegExp('\[c'+i+'\]\s*(✅|❌)');
    const m=text.match(re);
    if(m){
      const passed=m[1]==='✅';
      Object.keys(checks).forEach(g=>{
        checks[g]=checks[g].map(item=>item.id==='c'+i?{...item,done:passed}:item);
      });
    }
  }
  // c11,c13,c15,c16은 투자자 직접 확인 → 미체크 유지
  ['c11','c13','c15','c16'].forEach(id=>{
    Object.keys(checks).forEach(g=>{
      checks[g]=checks[g].map(item=>item.id===id?{...item,done:false}:item);
    });
  });
  sv('ch',checks);
  rChecklist();
  // 완료 메시지
  setTimeout(()=>{
    const r=document.getElementById('ch-ai-result');
    if(r){
      const note=document.createElement('div');
      note.style.cssText='font-size:12px;color:var(--yellow);margin-top:8px;padding:8px 12px;background:rgba(245,158,11,.1);border-radius:8px;margin-bottom:14px;';
      note.textContent='⚠️ 직접확인 표시 항목(손절선·비중·목표가·섹터분산)은 직접 체크하세요.';
      r.appendChild(note);
    }
  },300);
}

function togCh(group,id){
  checks[group]=checks[group].map(c=>c.id===id?{...c,done:!c.done}:c);
  sv('ch',checks);
  const inp=document.getElementById('ch-ticker');
  if(inp)chTicker=inp.value;
  rChecklist();
}

function resetCh(){
  checks=JSON.parse(JSON.stringify(CHECKS_DEF));
  sv('ch',checks);
  chTicker='';
  chAnalyzing=false;

}

// 빠른입력 폼 보조 함수
function qOnInput(v){
  qSQ=v;
  if(!v) qStock=null;
  const box=document.getElementById('qs-suggest');
  if(!box)return;
  if(!v){box.style.display='none';return;}
  const found=TOP135.filter(s=>s.name.includes(v)||s.code.includes(v)).slice(0,10);
  if(!found.length){box.style.display='none';return;}
  box.innerHTML=found.map(s=>`
    <div onmousedown="qSelStock('${s.name}','${s.code}','${s.bucket}','${s.sector}')"
      style="padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--card);">
      <span style="font-weight:600;font-size:14px;flex:1;">${s.name}</span>
      <span class="sbadge" style="background:${sc(s.sector)}22;color:${sc(s.sector)};">${s.sector}</span>
      <span style="font-size:11px;font-weight:700;color:${BC[s.bucket]};">${s.bucket}</span>
    </div>`).join('');
  box.style.display='block';
}

function qSelStock(name,code,bucket,sector){
  qStock={name,code,bucket:bucket||'안정형',sector:sector||''};
  qSQ=name;
  const inp=document.getElementById('qsinp');
  if(inp)inp.value=name;
  const box=document.getElementById('qs-suggest');
  if(box)box.style.display='none';
}

function autoQStop(pct){
  const pr=Number((document.getElementById('qprice-inp')||{}).value)||Number(qPrice)||0;
  if(!pr){alert('매수가를 먼저 입력해주세요.');return;}
  const stop=Math.round(pr*(1+pct/100));
  const el=document.getElementById('qstop-inp');
  if(el){el.value=stop;window._qStop=String(stop);}
}

function addQTag(t){
  qMemo=qMemo?(qMemo+' #'+t):'#'+t;
  const el=document.getElementById('qmemo-inp');
  if(el)el.value=qMemo;
}

function qFormSave(continueInput){
  // 최신 입력값 수집
  const sinp=document.getElementById('qsinp');
  if(sinp&&sinp.value&&!qStock){
    const found=TOP135.find(s=>s.name===sinp.value||s.code===sinp.value);
    qStock=found||{name:sinp.value,code:'',bucket:'안정형'};
    qSQ=sinp.value;
  }
  qPrice=(document.getElementById('qprice-inp')||{}).value||qPrice;
  qShares=(document.getElementById('qshares-inp')||{}).value||qShares;
  qMemo=(document.getElementById('qmemo-inp')||{}).value||qMemo;
  window._qTarget=(document.getElementById('qtarget-inp')||{}).value||'';
  window._qStop=(document.getElementById('qstop-inp')||{}).value||'';

  if(!qSQ&&!qStock){alert('종목을 선택하거나 입력해주세요.');return;}
  if(!qPrice||Number(qPrice)<=0){alert('매수가를 입력해주세요.');return;}
  if(!qShares||Number(qShares)<=0){alert('수량을 입력해주세요.');return;}

  // 저장 실행
  window._keepOpen=continueInput;
  saveQ();

  if(continueInput){
    // 연속 입력: 종목/가격/수량/메모만 초기화, 액션/시장 유지
    qStock=null;qSQ='';qPrice='';qShares='';qMemo='';
    window._qTarget='';window._qStop='';
    // 저장 완료 토스트
    showUndoToast('✅ 기록 저장! 계속 입력하세요');
    renderQForm();
  }
  // continueInput=false이면 saveQ에서 closeQ+go('journal') 처리
}

function selS(name,code,bucket){
  // TOP135에서 해당 종목 정보 찾기
  const found=TOP135.find(s=>s.code===code||s.name===name);
  qStock={name, code, bucket: bucket||found?.bucket||'안정형', sector: found?.sector||''};
  setQS('price');
}
function np(f,n){if(f==='p')qPrice+=n;else qShares+=n;renderQ();}
function nd(f){if(f==='p')qPrice=qPrice.slice(0,-1);else qShares=qShares.slice(0,-1);renderQ();}
function addTag(t){qMemo=qMemo?(qMemo+' #'+t):'#'+t;const el=document.getElementById('minp');if(el)el.value=qMemo;}
function saveMemo(){const el=document.getElementById('minp');if(el)qMemo=el.value;setQS('confirm');}
function saveQ(){
  const name=qStock?.name||qSQ;
  const code=qStock?.code||'';
  const price=Number(qPrice);
  const shares=Number(qShares);
  const entry={id:Date.now(),ticker:name,code,action:qAction,price,shares,memo:qMemo,market:qMarket,date:new Date().toISOString()};

  // 0) undo 스냅샷 저장 (복구용)
  pushUndo('journal_add', {
    entry,
    deposits: JSON.parse(JSON.stringify(deposits)),
    portfolio: JSON.parse(JSON.stringify(portfolio))
  });

  // 1) 투자일지 기록
  journal=[entry,...journal];
  sv('j',journal);

  // 2) 최근 종목 저장
  if(qStock){
    recent=[qStock,...(ld('r')||[]).filter(r=>r.code!==qStock.code)].slice(0,5);
    sv('r',recent);
  }

  // 3) 예수금 자동 계산 (매수: 차감 / 매도: 추가)
  const tradeAmount = price * shares;
  const fee = calcFee(tradeAmount, qAction, qMarket);
  const feeLabel = qAction==='매수'
    ? `수수료 ${fN(fee)}원`
    : `세금+수수료 ${fN(fee)}원`;

  if(qAction==='매수'){
    const total = tradeAmount + fee;
    // 잔액 많은 계좌에서 차감
    if(deposits.a1.amount >= deposits.a2.amount){
      deposits.a1.amount = Math.max(0, deposits.a1.amount - total);
    } else {
      deposits.a2.amount = Math.max(0, deposits.a2.amount - total);
    }
    sv('dep2', deposits);
  } else if(qAction==='매도'){
    const total = tradeAmount - fee;
    // 잔액 많은 계좌에 추가
    if(deposits.a1.amount >= deposits.a2.amount){
      deposits.a1.amount += total;
    } else {
      deposits.a2.amount += total;
    }
    sv('dep2', deposits);
  }

  // 4) 포트폴리오 자동 연동
  if(qAction==='매수'){
    // 같은 종목이 이미 있으면 평균단가·수량 합산
    const exist=portfolio.find(p=>p.name===name);
    if(exist){
      const newShares=exist.shares+shares;
      const avgPrice=Math.round((exist.price*exist.shares+price*shares)/newShares);
      portfolio=portfolio.map(p=>p.name===name?{...p,price:avgPrice,shares:newShares}:p);
      alert(`📊 포트폴리오 업데이트\n${name} 평균단가 ${avgPrice.toLocaleString()}원 / 총 ${newShares}주`);
    } else {
      // 새 종목 추가
      // TOP135 버킷 우선 적용
      const found=TOP135.find(s=>s.code===code||s.name===name);
      const bucket=qStock?.bucket||found?.bucket||'안정형';
      const pTarget=Number(window._qTarget||0);
      const pStop=Number(window._qStop||0);
      portfolio.push({id:Date.now()+1,name,code,price,shares,target:pTarget,stop:pStop,bucket,date:new Date().toISOString()});
      alert(`📊 포트폴리오 자동 추가\n${name} ${price.toLocaleString()}원 × ${shares}주`);
    }
    sv('p',portfolio);
  }
  else if(qAction==='매도'){
    // 매도 시 수량 차감, 0이 되면 종목 삭제
    const exist=portfolio.find(p=>p.name===name);
    if(exist){
      const leftShares=exist.shares-shares;
      if(leftShares<=0){
        portfolio=portfolio.filter(p=>p.name!==name);
        alert(`📊 포트폴리오에서 삭제\n${name} 전량 매도 완료`);
      } else {
        portfolio=portfolio.map(p=>p.name===name?{...p,shares:leftShares}:p);
        alert(`📊 포트폴리오 업데이트\n${name} 잔여 ${leftShares}주`);
      }
      sv('p',portfolio);
    }
  }

  closeQ();
  go('journal');
}

// ── 웹 검색 포함 비스트리밍 AI 호출 (브리핑/추천용) ─────────
async function streamAIWithSearch(prompt, onChunk){
  if(!apiKey){onChunk('⚠️ API 키가 설정되지 않았어요.');return;}
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),90000); // 90초 (웹검색 포함)

    onChunk('🔍 최신 뉴스 검색 중...');

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal:controller.signal,
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-5',
        max_tokens:2000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:'당신은 한국 주식(KRX) 전문 투자 분석가입니다. 반드시 웹 검색으로 24시간 이내 최신 뉴스를 먼저 검색한 후 분석하세요. 이모지를 활용해 읽기 쉽게 작성하고, 마크다운 없이 순수 텍스트로 답변하세요.',
        messages:[{role:'user',content:prompt}],
      }),
    });
    clearTimeout(timeout);

    if(!res.ok){
      const err=await res.json().catch(()=>({error:{message:res.statusText}}));
      const msg=err?.error?.message||res.statusText;
      if(res.status===401) onChunk('❌ API 키가 올바르지 않아요.');
      else if(res.status===402) onChunk('❌ API 크레딧이 부족해요. console.anthropic.com에서 충전해주세요.');
      else if(res.status===529) onChunk('❌ 서버가 혼잡해요. 잠시 후 다시 시도해주세요.');
      else onChunk('❌ 오류 ('+res.status+'): '+msg);
      return;
    }

    // 비스트리밍 응답 처리 (웹검색은 스트리밍 미지원)
    const data=await res.json();
    let fullText='';

    // content 배열에서 텍스트 블록만 추출
    if(data.content&&Array.isArray(data.content)){
      for(const block of data.content){
        if(block.type==='text'){
          fullText+=block.text;
        }
        // tool_use(검색 실행), tool_result(검색결과)는 건너뜀 - 최종 텍스트만 표시
      }
    }

    if(fullText){
      onChunk(fullText);
    } else {
      onChunk('⚠️ 응답을 받지 못했어요. 다시 시도해주세요.');
    }

  }catch(e){
    if(e.name==='AbortError') onChunk('⏱️ 시간 초과 (90초). 다시 시도해주세요.');
    else onChunk('❌ 연결 오류: '+e.message);
  }
}

// ── 일반 스트리밍 AI 호출 (분석탭 등 기존 기능용) ─────────────
async function streamAI(prompt,onChunk){
  if(!apiKey){onChunk('⚠️ API 키가 설정되지 않았어요.');return;}
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),55000);
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal:controller.signal,
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-5',
        max_tokens:1000,
        stream:true,
        system:'당신은 한국 주식(KRX) 전문 투자 분석가입니다. 간결하고 실용적인 분석을 한국어로 제공합니다. 이모지를 활용해 읽기 쉽게 작성하고, 마크다운 없이 순수 텍스트로 답변하세요.',
        messages:[{role:'user',content:prompt}],
      }),
    });
    clearTimeout(timeout);

    if(!res.ok){
      const err=await res.json().catch(()=>({error:{message:res.statusText}}));
      const msg=err?.error?.message||res.statusText;
      if(res.status===401) onChunk('❌ API 키가 올바르지 않아요.\n설정 탭에서 키를 다시 확인해주세요.');
      else if(res.status===429) onChunk('❌ 요청이 너무 많아요. 잠시 후 다시 시도해주세요.');
      else if(res.status===402) onChunk('❌ API 크레딧이 부족해요.\nconsole.anthropic.com에서 충전해주세요.');
      else onChunk('❌ 오류 ('+res.status+'): '+msg);
      return;
    }

    const reader=res.body.getReader();const decoder=new TextDecoder();let full='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      for(const line of decoder.decode(value).split('\n')){
        if(line.startsWith('data: ')){
          try{
            const d=JSON.parse(line.slice(6));
            full+=d.delta?.text||'';
            onChunk(full);
          }catch{}
        }
      }
    }
  }catch(e){
    if(e.name==='AbortError') onChunk('⏱️ 시간이 초과됐어요 (55초). 다시 시도해주세요.');
    else onChunk('❌ 연결 오류: '+e.message+'\n\nAPI 키와 인터넷 연결을 확인해주세요.');
  }
}
